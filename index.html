<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech News App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="landing">
        <h1>Welcome to Newsly</h1>
        <p>Get your daily technology news here.</p>
        <button id="explore-btn">Explore Articles</button>
    </div>

    <div id="main-app">
        <div class="header">
            <h1>Newsly</h1>
            <button id="darkbtn">Dark Mode</button>
        </div>

        <div class="controls">
            <!-- News App Inspiration: Category Menu Bar! -->
            <div id="category-bar">
                <button class="cat-btn" onclick="changeCategory('general')">General</button>
                <button class="cat-btn" onclick="changeCategory('technology')">Technology</button>
                <button class="cat-btn" onclick="changeCategory('business')">Business</button>
                <button class="cat-btn" onclick="changeCategory('sports')">Sports</button>
                <button class="cat-btn" onclick="changeCategory('health')">Health</button>
            </div>

            <input type="text" id="searchbox" placeholder="Search news...">
            
            <select id="sortbox">
                <option value="default">Sort: Default</option>
                <option value="az">Sort: A - Z</option>
                <option value="za">Sort: Z - A</option>
            </select>

            <select id="filterbox">
                <option value="all">Filter: All</option>
                <option value="liked">Filter: Liked</option>
            </select>
        </div>

        <div class="app-layout">
            <div id="news-container">
                <!-- News App Inspiration: Live Date & Active Category Header! -->
                <h2 id="date-header">Today's Top Stories</h2>
                
                <div id="news-grid">
                    <p>Loading...</p>
                </div>
            </div>

            <div class="sidebar">
                <h3>Top Summaries</h3>
                <div id="summary-container"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
