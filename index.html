<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech News App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="landing" class="landing-page">
        <div class="landing-content">
            <h1>Welcome to Tech News</h1>
            <p>Get your daily technology news here.</p>
            <button id="explore-btn" class="primary-btn">Explore Articles</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="header">
            <h1>Tech News App</h1>
            <button id="darkbtn">Dark Mode</button>
        </div>

        <div class="controls">
            <input type="text" id="searchbox" placeholder="Search news...">
            
            <select id="sortbox">
                <option value="default">Sort: Default</option>
                <option value="az">Sort: A - Z</option>
                <option value="za">Sort: Z - A</option>
            </select>

            <select id="filterbox">
                <option value="all">Filter: All</option>
                <option value="liked">Filter: Liked</option>
            </select>
        </div>

        <!-- App Layout Grid -->
        <div class="app-layout">
            <div id="news-container">
                <p class="placeholder-text">Loading...</p>
            </div>

            <!-- New feature: Quick Summaries Sidebar! -->
            <div class="sidebar">
                <h3>Top Summaries</h3>
                <div id="summary-container"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
